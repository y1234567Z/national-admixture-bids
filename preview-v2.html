    const isNearBid = (row) => row.deadlineStatus === "near";
    const isNewBid = (row) => row.isNew === "是";
    const hasBusinessTerms = (row) => [row.performance, row.payment, row.settlement, row.deposit].some(good);
    const bidDeadlineTime = (row) => parseDate(deadline(row))?.getTime() || Number.POSITIVE_INFINITY;
    const bidText = (row) => [row.name, row.materials, row.notes, row.delivery, row.owner].join(" ");
    const hasWaterReducer = (row) => /减水剂|聚羧酸|减水母液|保坍|母液/.test(bidText(row));
    const hasAccelerator = (row) => /速凝剂|无碱速凝/.test(bidText(row));
    const hasExpansive = (row) => /膨胀剂/.test(bidText(row));
    const isCoreMaterial = (row) => hasWaterReducer(row) || hasAccelerator(row);
    const isHighBid = (row) => {
      const text = bidText(row);
      return isNearBid(row) || /抽水蓄能|水电|大坝|水利|高速|高铁|铁路|隧道|桥|外加剂|膨胀剂|减水剂|速凝剂|混凝土/.test(text);
    };
    const stars = (value) => {
      const score = Number(value ?? 0);
      const count = Math.max(1, Math.min(5, Math.ceil(score / 20)));
      return "★".repeat(count) + "☆".repeat(5 - count);
    };
    function renderStatus() {
      const meta = payload.meta || {};
      const newsMeta = payload.newsMeta || {};
      const [datePart, timePart] = String(meta.updatedAt || "").split(" ");
      els.syncTime.innerHTML = `${escapeHtml(datePart || "")}${timePart ? `<br>${escapeHtml(timePart)}` : ""}`;
      const items = [
        ["正在招标", meta.byCategory?.["正在招标"] || 0, "open"],
        ["历史招标", meta.byCategory?.["历史招标"] || 0, "history"],
        ["基建动态", newsMeta.totalNews || (payload.news || []).length || 0, "news"],
        ["高价值", newsMeta.highTrackingCount || 0, "high"],
        ["覆盖省份", meta.provinceCount || meta.provinces?.length || 0, "province"],
      ];
      els.statusStrip.innerHTML = items.map(([label, value, action]) => `<button class="pill ${isPillActive(action) ? "active" : ""}" data-action="${escapeHtml(action)}"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></button>`).join("");
      els.provincePanel.innerHTML = `覆盖省份：${escapeHtml((meta.provinces || []).join("、"))}`;
      els.provincePanel.classList.toggle("open", state.provinceOpen);
      els.statusStrip.querySelectorAll(".pill").forEach((pill) => {
        pill.addEventListener("click", () => handleStatusAction(pill.dataset.action));
      });
    }
    function isPillActive(action) {
      return (action === "open" && state.focus === "open") ||
        (action === "history" && state.focus === "history") ||
        (action === "high" && state.focus === "high") ||
        (action === "province" && state.provinceOpen);
    }
    function scrollToEl(el) {
      el?.scrollIntoView({ behavior: "smooth", block: "start" });
      el?.classList.add("pulse");
      setTimeout(() => el?.classList.remove("pulse"), 650);
    }
    function setFocus(next) {
      state.focus = next;
      state.expandedBids = next === "history";
      els.focus.value = ["all", "near", "new", "priced"].includes(next) ? next : "all";
      renderStatus();
      renderAttention();
      renderSummary();
      scrollToEl(els.attentionList);
    }
    function handleStatusAction(action) {
      if (action === "open") setFocus("open");
      if (action === "history") setFocus("history");
      if (action === "high") setFocus("high");
      if (action === "news") scrollToEl(document.querySelector(".infra"));
      if (action === "province") {
        state.provinceOpen = !state.provinceOpen;
        renderStatus();
        scrollToEl(els.provincePanel);
      }
    }
    function bidPriority(row) {
      if (isOpenBid(row) && hasWaterReducer(row)) return 900;
      if (isOpenBid(row) && hasAccelerator(row)) return 880;
      if (isNearBid(row) && hasWaterReducer(row)) return 850;
      if (isNearBid(row) && hasAccelerator(row)) return 830;
      if (isNewBid(row) && isCoreMaterial(row)) return 800;
      if (isOpenBid(row) && isHighBid(row)) return 700;
      if (hasExpansive(row)) return 420;
      if (isOpenBid(row)) return 360;
      if (hasBusinessTerms(row)) return 240;
      if (isHistoryBid(row)) return 0;
      return 100;
    }
    function scoreBid(row) {
      const d = parseDate(deadline(row));
      const days = d ? Math.ceil((d - new Date()) / 86400000) : 999;
      const deadlineScore = d && days >= 0 ? Math.max(0, 80 - days * 8) : 0;
      return bidPriority(row) + deadlineScore + (isCoreMaterial(row) ? 45 : 0) + (isHighBid(row) ? 24 : 0) + (isNewBid(row) ? 28 : 0) + (isHistoryBid(row) ? -260 : 0);
    }
    function filteredRows() {
      const keyword = state.keyword.trim().toLowerCase();
      return [...(payload.latest.rows || [])].filter((row) => {
        if (state.focus === "near" && row.deadlineStatus !== "near") return false;
        if (state.focus === "new" && row.isNew !== "是") return false;
        if (state.focus === "priced" && !good(row.firstPrice)) return false;
        if (state.focus === "open" && !isOpenBid(row)) return false;
        if (state.focus === "history" && !isHistoryBid(row)) return false;
        if (state.focus === "high" && !(isHighBid(row) || isNearBid(row))) return false;
        if (state.focus === "business" && !hasBusinessTerms(row)) return false;
        if (!keyword) return true;
        return [row.name, row.province, row.city, row.owner, row.materials].join(" ").toLowerCase().includes(keyword);
      }).sort((a, b) => scoreBid(b) - scoreBid(a) || bidDeadlineTime(a) - bidDeadlineTime(b));
    }
    function renderBid(row) {
      const place = [row.province, row.city].filter(good).join(" ");
      const meta = [row.owner, row.materials].filter(good).join(" / ");
      const hot = isHighBid(row);
      const original = good(row.sourceLink) ? `<a class="action" href="${escapeHtml(row.sourceLink)}" target="_blank" rel="noreferrer noopener">查看原文</a>` : "";
      const cardClass = ["card", "bid-card", isNearBid(row) ? "is-near" : "", isOpenBid(row) ? "is-open" : "", isNewBid(row) ? "is-new" : "", isHistoryBid(row) ? "is-history" : ""].filter(Boolean).join(" ");
      const deadlineText = daysUntil(deadline(row));
      return `<article class="${cardClass}">
        <div>
          ${place ? `<div class="bid-place">${escapeHtml(place)}</div>` : ""}
          <h3 class="bid-title">${escapeHtml(row.name)}</h3>
          ${meta ? `<div class="bid-meta">${escapeHtml(meta)}</div>` : ""}
          <div class="bid-deadline ${isNearBid(row) ? "near" : ""}">${escapeHtml(deadlineText)}</div>
          <div class="tags">${isNearBid(row) ? '<span class="tag hot">临近截止</span>' : ''}${hasWaterReducer(row) ? '<span class="tag ok">减水剂</span>' : ''}${hasAccelerator(row) ? '<span class="tag ok">速凝剂</span>' : ''}${hot ? '<span class="tag ok">高价值</span>' : ''}${isOpenBid(row) ? '<span class="tag blue">正在招标</span>' : ''}${isHistoryBid(row) ? '<span class="tag gray">历史招标</span>' : ''}</div>
        </div>
        <div class="actions"><a class="action detail-action" href="#" onclick="this.closest('article').querySelector('details')?.toggleAttribute('open'); return false;">查看详情</a>${original}</div>
        <details style="grid-column: 1 / -1;"><summary>展开更多</summary><div class="detail-grid">
          ${good(row.agent) ? `<div class="detail"><span>代理</span><p>${escapeHtml(row.agent)}</p></div>` : ""}
          ${good(row.firstPrice) ? `<div class="detail"><span>报价/中标价</span><p>${escapeHtml(row.firstPrice)}</p></div>` : ""}
          ${good(row.performance) ? `<div class="detail"><span>履约</span><p>${escapeHtml(row.performance)}</p></div>` : ""}
          ${good(row.payment) ? `<div class="detail"><span>付款</span><p>${escapeHtml(row.payment)}</p></div>` : ""}
          ${good(row.notes) ? `<div class="detail"><span>备注</span><p>${escapeHtml(row.notes)}</p></div>` : ""}
        </div></details>
      </article>`;
    }
    function renderAttention() {
      const rows = filteredRows();
      els.attentionCount.textContent = `筛选出 ${rows.length} 条线索`;
      const visible = state.expandedBids ? rows : rows.slice(0, 8);
      els.attentionList.innerHTML = visible.map(renderBid).join("") || '<div class="empty">今天没有匹配的招标线索。</div>';
      if (rows.length > 8) els.attentionList.innerHTML += `<button class="more" id="more-bids">${state.expandedBids ? "收起" : `展开全部 ${rows.length} 条`}</button>`;
      document.getElementById("more-bids")?.addEventListener("click", () => { state.expandedBids = !state.expandedBids; renderAttention(); });
    }
    function renderSummary() {
      const rows = payload.latest.rows || [];
      const near = rows.filter((row) => row.deadlineStatus === "near");
      const todayNew = rows.filter((row) => row.isNew === "是");
      const business = rows.filter((row) => [row.performance, row.payment, row.settlement].some(good));
      const limited = Number(payload.newsMeta?.limitedSourceCount || 0);
      const sourceItems = limited
        ? [`${limited} 个公众号来源受限，任务不会中断。`, ...(state.sourceExpanded ? ["受限来源会按记录保留，不会因为登录、验证码或公开搜索限制中断每日抓取。"] : [])]
        : ["当前没有来源异常。"];
      const groups = [
        ["临近截止", "near", near.map((row) => `${row.province || ""}${row.name}`)],
        ["今日新增", "new", todayNew.map((row) => `${row.province || ""}${row.name}`)],
        ["重要商务条款", "business", business.map((row) => `${row.province || ""}${row.name}`)],
        ["来源异常提醒", "source", sourceItems],
      ];
      els.summaryList.innerHTML = groups.map(([title, action, items]) => {
        const expanded = Boolean(state.summaryExpanded[action]) || action === "source" && state.sourceExpanded;
        const visibleItems = expanded ? items : items.slice(0, 2);
        const more = items.length > 2 ? `<button class="summary-more" data-more="${escapeHtml(action)}">${expanded ? "收起" : `查看全部 ${items.length} 条`}</button>` : "";
        return `<section class="card summary-card ${state.focus === action ? "active" : ""}" data-action="${escapeHtml(action)}"><h3>${escapeHtml(title)}</h3><ul>${visibleItems.length ? visibleItems.map((item) => `<li>${escapeHtml(item)}</li>`).join("") : '<li>今天没有新情况。</li>'}</ul>${more}</section>`;
      }).join("");
      els.summaryList.querySelectorAll(".summary-more").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const action = button.dataset.more;
          state.summaryExpanded[action] = !state.summaryExpanded[action];
          renderSummary();
        });
      });
      els.summaryList.querySelectorAll(".summary-card").forEach((card) => {
        card.addEventListener("click", () => {
          const action = card.dataset.action;
          if (action === "source") {
            state.provinceOpen = false;
            state.sourceExpanded = !state.sourceExpanded;
            renderStatus();
            renderSummary();
            scrollToEl(card);
          } else {
            setFocus(action);
          }
        });
      });
      renderFetchStatus();
    }
    function renderFetchStatus() {
      const tenderErrorCount = 0;
      const wechatErrorCount = Number(payload.newsMeta?.limitedSourceCount || 0);
      els.fetchStatus.classList.toggle("open", state.fetchExpanded);
      els.fetchStatus.innerHTML = `<h3>数据抓取状态</h3>
        <ul>
          <li>招标网站异常 ${tenderErrorCount} 个</li>
          <li>公众号异常 ${wechatErrorCount} 个</li>
        </ul>
        <button id="fetch-status-toggle">${state.fetchExpanded ? "收起详情" : "查看详情"}</button>
        <div class="fetch-detail">状态表已生成：reports/fetch_status_latest.md。公众号异常主要来自公开搜索、登录环境或微信访问限制；招标网站异常会在后续抓取流程中按平台记录。</div>`;
      document.getElementById("fetch-status-toggle")?.addEventListener("click", () => {
        state.fetchExpanded = !state.fetchExpanded;
        renderFetchStatus();
      });
    }
    function sortNews(items) {
      return [...items].sort((a, b) => newsOpportunity(b).score - newsOpportunity(a).score || Number(b.trackingValue || 0) - Number(a.trackingValue || 0) || String(b.publishDate || "").localeCompare(String(a.publishDate || "")));
    }
    function renderTopFive(news) {
      const top = sortNews(news).slice(0, 5);
      els.topFive.innerHTML = `<h3>今日最值得跟踪 TOP5</h3><div class="rank-list">${top.map((item, index) => `<div class="rank-item"><span class="rank-num">${index + 1}</span><span class="rank-name">${escapeHtml(item.projectName || item.title)}<br><small>${escapeHtml(item.stage || "")} ${escapeHtml(item.publishDate || "")}</small></span></div>`).join("")}</div>`;
    }
    function renderNewsCard(item) {
      const place = [item.province, item.city].filter(Boolean).join(" ");
      const original = item.url ? `<a class="action primary" href="${escapeHtml(item.url)}" target="_blank" rel="noreferrer noopener">查看原文</a>` : "";
      const opp = newsOpportunity(item);
      return `<article class="card news-card ${escapeHtml(opp.className)}"><div class="news-main"><div>
        <h3 class="news-title">${escapeHtml(item.projectName || item.title)}</h3>
        ${item.contractor ? `<div class="contractor-line">施工单位：${escapeHtml(item.contractor)}</div>` : ""}
        <div class="news-meta">${[item.projectType, item.stage, place].filter(Boolean).map(escapeHtml).join(" / ")}</div>
        <div class="opportunity-note">${escapeHtml(opp.label)}：${escapeHtml(opp.note)}</div>
      </div><div class="stars">${stars(item.trackingValue)}</div></div>
      ${original}
      <details><summary>展开详情</summary><div class="detail-grid">
        ${item.contractor ? `<div class="detail"><span>施工单位</span><p>${escapeHtml(item.contractor)}</p></div>` : ""}
        ${item.owner ? `<div class="detail"><span>业主</span><p>${escapeHtml(item.owner)}</p></div>` : ""}
        ${item.supervisor ? `<div class="detail"><span>监理</span><p>${escapeHtml(item.supervisor)}</p></div>` : ""}
        ${item.amount ? `<div class="detail"><span>金额</span><p>${escapeHtml(item.amount)}</p></div>` : ""}
        ${item.keywords?.length ? `<div class="detail"><span>关键词</span><p>${escapeHtml(item.keywords.join("、"))}</p></div>` : ""}
        ${item.summary ? `<div class="detail"><span>摘要</span><p>${escapeHtml(item.summary)}</p></div>` : ""}
      </div></details></article>`;
    }
    function newsText(item) {
      return [item.title, item.projectName, item.stage, item.summary, item.keywords?.join(" "), item.contractor].join(" ");
    }
    function newsOpportunity(item) {
      const text = newsText(item);
      const high = /中标|施工总承包中标|EPC中标|项目部成立|实验室建设|拌合站建设|材料招标准备|进场准备/.test(text);
      const mid = /开工|首仓|隧道进洞|桩基开始/.test(text);
      const low = /主体施工|主体工程施工|全面施工|混凝土浇筑|大面积混凝土|隧道贯通|主体完工|项目完工|竣工|交工验收/.test(text);
      if (low && !high) return { score: 20, className: "opp-risk", label: "减水剂机会低", note: "主体施工或后期节点已出现，关注膨胀剂/速凝剂/小料补充需求" };
      if (high) return { score: 90, className: "opp-high", label: "减水剂机会高", note: "施工方刚明确或前期准备中，适合提前接触项目部" };
      if (mid) return { score: 60, className: "opp-mid", label: "减水剂机会中", note: "项目进入开工早期，仍可跟踪材料试验和补充采购窗口" };
      return { score: 40, className: "opp-low", label: "减水剂机会待观察", note: "公开信息偏泛，等待项目部、试验室或材料招标准备信号" };
    }
    function filteredNews() {
      return sortNews(payload.news || []).filter((item) => {
        if (state.newsFilter === "high") return Number(item.trackingValue || 0) >= 80;
        if (state.newsFilter === "bid") return item.stage === "中标";
        if (state.newsFilter === "start") return item.stage === "开工";
        if (state.newsFilter === "progress") return ["施工进展", "贯通", "首仓"].includes(item.stage);
        if (state.newsFilter === "link") return Boolean(item.url);
        return true;
      });
    }
    function renderNewsFilter() {
      const filters = [
        ["全部", "all"],
        ["高价值跟踪", "high"],
        ["中标阶段", "bid"],
        ["开工阶段", "start"],
        ["施工进展", "progress"],
        ["原文可访问", "link"],
      ];
      els.newsFilter.innerHTML = filters.map(([label, value]) => `<button class="filter-chip ${state.newsFilter === value ? "active" : ""}" data-filter="${escapeHtml(value)}">${escapeHtml(label)}</button>`).join("");
      els.newsFilter.querySelectorAll(".filter-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          state.newsFilter = chip.dataset.filter;
          state.expandedNews = false;
          renderNews();
          scrollToEl(els.newsFilter);
        });
      });
    }
    function renderNews() {
      const news = filteredNews();
      renderTopFive(payload.news || []);
      renderNewsFilter();
      const visible = state.expandedNews ? news : news.slice(0, 8);
      els.newsFlow.innerHTML = visible.map(renderNewsCard).join("") || '<div class="empty">暂无基建动态。</div>';
      if (news.length > 8) els.newsFlow.innerHTML += `<button class="more" id="more-news">${state.expandedNews ? "收起" : `展开全部 ${news.length} 条`}</button>`;
      document.getElementById("more-news")?.addEventListener("click", () => { state.expandedNews = !state.expandedNews; renderNews(); });
    }
    els.keyword.addEventListener("input", () => { state.keyword = els.keyword.value; state.expandedBids = false; renderAttention(); });
    els.focus.addEventListener("change", () => { state.focus = els.focus.value; state.expandedBids = false; renderStatus(); renderAttention(); renderSummary(); });
    renderStatus();
    renderAttention();
    renderSummary();
    renderNews();
  </script>
</body>
</html>
