<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>全国外加剂招标监控</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: rgba(255, 252, 247, 0.9);
      --panel-strong: #fffdfa;
      --line: #ded4c5;
      --line-strong: #cdbca5;
      --text: #2d241b;
      --muted: #6e6255;
      --accent: #8b5e34;
      --accent-soft: #efe4d2;
      --accent-deep: #5f3d1f;
      --danger: #b43a2d;
      --danger-soft: #fbe4df;
      --price: #17684b;
      --price-soft: #e5f3ed;
      --new: #fff0bf;
      --shadow: 0 16px 40px rgba(75, 51, 27, 0.08);
      --radius: 18px;
      --mono: "SFMono-Regular", "Consolas", monospace;
      --sans: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 28%),
        linear-gradient(180deg, #efe9df 0%, #f8f5ef 38%, #f5f1ea 100%);
      color: var(--text);
      font-family: var(--sans);
    }
    a { color: var(--accent-deep); }
    .page { max-width: 1460px; margin: 0 auto; padding: 24px; }
    .hero, .panel {
      background: var(--panel);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(222, 212, 197, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 28px;
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -90px auto;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(139, 94, 52, 0.16), transparent 60%);
      pointer-events: none;
    }
    .eyebrow {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-deep);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .hero h1 {
      margin: 14px 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.05;
    }
    .hero p {
      margin: 0;
      max-width: 920px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }
    .overview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 24px;
    }
    .stat-card.wide {
      grid-column: 1 / -1;
    }
    .stat-card {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(222, 212, 197, 0.95);
      border-radius: 16px;
      padding: 16px;
    }
    .stat-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .stat-card strong {
      font-size: 28px;
      line-height: 1;
    }
    .stat-card .stat-list {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
      display: block;
    }
    .summary-grid, .content-grid {
      display: grid;
      gap: 18px;
      margin-bottom: 20px;
    }
    .summary-grid {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    .summary-card {
      padding: 18px;
    }
    .summary-card h2 {
      margin: 0 0 10px;
      font-size: 16px;
      color: var(--accent-deep);
    }
    .summary-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }
    .summary-card ol {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }
    .summary-card li + li {
      margin-top: 8px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1.5fr repeat(4, minmax(120px, 0.7fr));
      gap: 12px;
      padding: 16px;
      position: sticky;
      top: 12px;
      z-index: 10;
      margin-bottom: 20px;
    }
    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .control label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .control input, .control select {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.92);
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
      color: var(--text);
    }
    .change-log {
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .change-log h2, .section h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .changes-grid {
      display: grid;
      gap: 10px;
    }
    .changes-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .change-group {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.58);
    }
    .change-group h3 {
      margin: 0 0 6px;
      font-size: 13px;
      color: var(--accent-deep);
    }
    .change-group ul {
      margin: 0;
      padding-left: 16px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 12px;
    }
    .section {
      padding: 18px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin-bottom: 14px;
    }
    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }
    .columns {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .column {
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .column-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: linear-gradient(180deg, #fffdf9 0%, #f8efe3 100%);
      border: 1px solid var(--line);
      font-weight: 700;
    }
    .column-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    .empty {
      padding: 18px;
      border: 1px dashed var(--line-strong);
      border-radius: 16px;
      color: var(--muted);
      background: rgba(255,255,255,0.55);
      font-size: 14px;
    }
    .project-card {
      border: 1px solid rgba(222, 212, 197, 0.95);
      border-radius: 16px;
      padding: 16px;
      background: var(--panel-strong);
      display: grid;
      gap: 12px;
    }
    .project-card.new-card {
      background: linear-gradient(180deg, #fff9e8 0%, #fffdf6 100%);
      box-shadow: inset 0 0 0 1px rgba(255, 215, 102, 0.5);
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }
    .card-top h3 {
      margin: 0;
      font-size: 17px;
      line-height: 1.4;
    }
    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-deep);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .chip.near {
      background: var(--danger-soft);
      color: var(--danger);
    }
    .chip.new {
      background: var(--new);
      color: #7a5600;
    }
    .kv-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 14px;
    }
    .kv {
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    .kv span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .kv strong, .kv div {
      display: block;
      font-size: 14px;
      line-height: 1.6;
      font-weight: 600;
    }
    .weak {
      color: var(--muted);
      font-weight: 500;
    }
    .price {
      color: var(--price);
      background: var(--price-soft);
      border-radius: 10px;
      padding: 4px 8px;
      display: inline-block;
    }
    details {
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    summary {
      cursor: pointer;
      font-weight: 700;
      color: var(--accent-deep);
      list-style: none;
    }
    summary::-webkit-details-marker { display: none; }
    .detail-grid {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .detail-item {
      padding: 12px;
      border-radius: 12px;
      background: rgba(243, 236, 225, 0.55);
    }
    .detail-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .detail-item p {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 13px;
    }
    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }
    .mono {
      font-family: var(--mono);
    }
    @media (max-width: 1180px) {
      .columns { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .changes-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      .page { padding: 14px; }
      .hero, .panel, .section, .change-log, .summary-card { padding: 16px; }
      .toolbar { grid-template-columns: 1fr; top: 8px; }
      .kv-grid { grid-template-columns: 1fr; }
      .card-top { flex-direction: column; }
    }
  </style>
</head>

  <div class="page">

      </div>
    </section>

    <section class="panel section">
      <div class="section-head">
        <div>
          <h2>项目看板</h2>
          <p id="result-count"></p>
        </div>
        <p class="mono" id="updated-at"></p>
      </div>
      <div class="columns">
        <div class="column">
          <div class="column-title">正在招标 <span id="ongoing-count"></span></div>
          <div id="ongoing-list"></div>
        </div>
        <div class="column">
          <div class="column-title">历史招标 <span id="history-count"></span></div>
          <div id="history-list"></div>
        </div>
      </div>
      <div class="footer-note">字段口径保持原有监控规则：无法确认的内容统一显示为“未公开/未检索到”，不会推测补全。变化日志只展示相对上一版最新快照的差异。</div>
    </section>
  </div>

  <script>
    const payload = JSON.parse(document.getElementById("site-data").textContent);
    const state = {
      keyword: "",
      province: "all",
      focus: "all",
      category: "all",
      sort: "deadline",
    };

    const els = {
      overview: document.getElementById("overview"),
      summaryGrid: document.getElementById("summary-grid"),
      province: document.getElementById("province"),
      keyword: document.getElementById("keyword"),
      focus: document.getElementById("focus"),
      category: document.getElementById("category"),
      sort: document.getElementById("sort"),
      changes: document.getElementById("changes"),
      resultCount: document.getElementById("result-count"),
      updatedAt: document.getElementById("updated-at"),
      ongoingCount: document.getElementById("ongoing-count"),
      historyCount: document.getElementById("history-count"),
      ongoingList: document.getElementById("ongoing-list"),
      historyList: document.getElementById("history-list"),
    };

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    const valueClass = (value) =>
      !value || value === "未公开/未检索到" || value === "截止时间待核实" ? "weak" : "";

    const meaningfulPrice = (row) => row.firstPrice && row.firstPrice !== "未公开/未检索到";

    const detailValue = (value) => value && value !== "未公开/未检索到" ? value : "未公开/未检索到";

    const deadlineLabel = (row) => row.bidEndAt !== "未公开/未检索到" ? row.bidEndAt : row.fileEndAt;

    const parseDate = (value) => {
      if (!value || value === "未公开/未检索到" || value === "已截止" || value === "截止时间待核实") return null;
      if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return new Date(value + "T23:59:00+08:00");
      if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}$/.test(value)) return new Date(value.replace(" ", "T") + ":00+08:00");
      return null;
    };

    const provinceOptions = ["all", ...new Set(payload.latest.rows.map((row) => row.province))];
    els.province.innerHTML = provinceOptions
      .map((province) => `<option value="${escapeHtml(province)}">${province === "all" ? "全部省份" : escapeHtml(province)}</option>`)
      .join("");

    function renderOverview() {
      const stats = [
        { label: "更新时间", value: payload.meta.updatedAt, type: "strong", className: "wide" },
        { label: "正在招标", value: String(payload.meta.byCategory["正在招标"] || 0), type: "strong" },
        { label: "历史招标", value: String(payload.meta.byCategory["历史招标"] || 0), type: "strong" },
        { label: "本次变化数", value: String(payload.meta.changeCount), type: "strong" },
        { label: "覆盖省份", value: payload.meta.provinces.join("、"), type: "list" },
      ];
      els.overview.innerHTML = stats.map((item) => `
        <div class="stat-card ${item.className || ""}">
          <span>${escapeHtml(item.label)}</span>
          ${item.type === "list"
            ? `<div class="stat-list">${escapeHtml(item.value)}</div>`
            : `<strong>${escapeHtml(item.value)}</strong>`}
        </div>
      `).join("");
    }

    function renderSummaries(rows) {
      const newRows = rows.filter((row) => row.isNew === "是");
      const nearRows = rows.filter((row) => row.category === "正在招标" && row.deadlineStatus === "near");
      const resultRows = rows.filter((row) => row.changeTypes.includes("resultUpdated"));
      const businessRows = rows.filter((row) => [row.performance, row.payment, row.settlement].some((value) => value && value !== "未公开/未检索到"));
      const cards = [
        { title: "今日新增", type: "text", value: newRows.length ? newRows.map((row) => `${row.province}${row.name}`).join("；") : "今日未检索到新增项目。" },
        { title: "新增历史结果/报价", type: "text", value: resultRows.length ? resultRows.map((row) => `${row.province}${row.name}：${row.firstUnit}，${row.firstPrice}`).join("；") : "今日未检索到新增结果价格。" },
        { title: "正在招标临近截止", type: "text", value: nearRows.length ? nearRows.map((row) => `${row.province}${row.name}：${deadlineLabel(row)}`).join("；") : "当前无临近截止项目。" },
        {
          title: "重要商务条款需关注",
          type: businessRows.length ? "list" : "text",
          value: businessRows.length
            ? businessRows.slice(0, 5).map((row) => `${row.province}${row.name}：${row.performance !== "未公开/未检索到" ? row.performance : row.payment !== "未公开/未检索到" ? row.payment : row.settlement}`)
            : "当前公开页面未补充明显商务条款。",
        },
      ];
      els.summaryGrid.innerHTML = cards.map((card) => `
        <section class="panel summary-card">
          <h2>${escapeHtml(card.title)}</h2>
          ${card.type === "list"
            ? `<ol>${card.value.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ol>`
            : `<p>${escapeHtml(card.value)}</p>`}
        </section>
      `).join("");
    }

    function renderChanges() {
      const groups = [
        ["新增项目", payload.changes.newItems, (item) => `${item.province}${item.name}`],
        ["转入历史招标", payload.changes.movedToHistory, (item) => `${item.row.province}${item.row.name}`],
        ["结果/报价更新", payload.changes.resultUpdated, (item) => `${item.current.province}${item.current.name}${item.current.firstPrice ? "：" + item.current.firstPrice : ""}`],
        ["其他字段更新", payload.changes.fieldUpdated, (item) => `${item.current.province}${item.current.name}（${item.changedFields.join("、")}）`],
      ];
      const renderGroup = ([title, items, formatter]) => `
        <div class="change-group">
          <h3>${escapeHtml(title)}</h3>
          ${items.length ? `<ul>${items.map((item) => `<li>${escapeHtml(formatter(item))}</li>`).join("")}</ul>` : '<div class="empty">本次无此类变化</div>'}
        </div>
      `;
      els.changes.innerHTML = `<div class="changes-grid">
        <div class="changes-row">${groups.slice(0, 2).map(renderGroup).join("")}</div>
        <div class="changes-row">${groups.slice(2, 4).map(renderGroup).join("")}</div>
      </div>`;
    }

    function applyFilters(rows) {
      const keyword = state.keyword.trim().toLowerCase();
      return rows.filter((row) => {
        if (state.category !== "all" && row.category !== state.category) return false;
        if (state.province !== "all" && row.province !== state.province) return false;
        if (state.focus === "near" && row.deadlineStatus !== "near") return false;
        if (state.focus === "priced" && !meaningfulPrice(row)) return false;
        if (state.focus === "new" && row.isNew !== "是") return false;
        if (!keyword) return true;
        const haystack = [
          row.name,
          row.owner,
          row.sourcePlatform,
          row.materials,
          row.province,
          row.city,
        ].join(" ").toLowerCase();
        return haystack.includes(keyword);
      }).sort((a, b) => {
        if (state.sort === "publish") {
          return (parseDate(b.publishAt)?.getTime() || 0) - (parseDate(a.publishAt)?.getTime() || 0);
        }
        if (state.sort === "updated") {
          return (parseDate(b.updatedAt)?.getTime() || 0) - (parseDate(a.updatedAt)?.getTime() || 0);
        }
        const aDeadline = parseDate(deadlineLabel(a));
        const bDeadline = parseDate(deadlineLabel(b));
        if (aDeadline && bDeadline) return aDeadline - bDeadline;
        if (aDeadline) return -1;
        if (bDeadline) return 1;
        return (parseDate(b.publishAt)?.getTime() || 0) - (parseDate(a.publishAt)?.getTime() || 0);
      });
    }

    function renderRow(row) {
      const chips = [
        row.isNew === "是" ? '<span class="chip new">今日新增</span>' : "",
        row.deadlineStatus === "near" ? '<span class="chip near">临近截止</span>' : "",
        meaningfulPrice(row) ? '<span class="chip">有报价/中标价</span>' : "",
      ].filter(Boolean).join("");

      return `
        <article class="project-card ${row.isNew === "是" ? "new-card" : ""}">
          <div class="card-top">
            <div>
              <div class="meta-line">
                <span>${escapeHtml(row.province)}</span>
                <span>/</span>
                <span>${escapeHtml(row.city)}</span>
                <span>/</span>
                <span>${escapeHtml(row.sourcePlatform)}</span>
              </div>
              <h3>${escapeHtml(row.name)}</h3>
            </div>
            <div>${chips}</div>
          </div>
          <div class="kv-grid">
            <div class="kv"><span>招标主体</span><div class="${valueClass(row.owner)}">${escapeHtml(row.owner)}</div></div>
            <div class="kv"><span>物资类型</span><div class="${valueClass(row.materials)}">${escapeHtml(row.materials)}</div></div>
            <div class="kv"><span>项目状态</span><div class="${valueClass(row.status)}">${escapeHtml(row.status)}</div></div>
            <div class="kv"><span>公告发布时间</span><div class="${valueClass(row.publishAt)}">${escapeHtml(row.publishAt)}</div></div>
            <div class="kv"><span>投标/报价截止</span><div class="${row.deadlineStatus === "near" ? "price" : valueClass(row.bidEndAt)}">${escapeHtml(row.bidEndAt)}</div></div>
            <div class="kv"><span>第一名报价/中标价</span><div class="${meaningfulPrice(row) ? "price" : valueClass(row.firstPrice)}">${escapeHtml(row.firstPrice)}</div></div>
          </div>
          <details>
            <summary>展开查看商务条款与完整字段</summary>
            <div class="detail-grid">
              <div class="detail-item"><span>代理机构</span><p>${escapeHtml(detailValue(row.agent))}</p></div>
              <div class="detail-item"><span>招标方式</span><p>${escapeHtml(detailValue(row.method))}</p></div>
              <div class="detail-item"><span>文件获取截止</span><p>${escapeHtml(detailValue(row.fileEndAt))}</p></div>
              <div class="detail-item"><span>开标时间</span><p>${escapeHtml(detailValue(row.openAt))}</p></div>
              <div class="detail-item"><span>投标保证金</span><p>${escapeHtml(detailValue(row.deposit))}</p></div>
              <div class="detail-item"><span>合同结算方式</span><p>${escapeHtml(detailValue(row.settlement))}</p></div>
              <div class="detail-item"><span>履约方式</span><p>${escapeHtml(detailValue(row.performance))}</p></div>
              <div class="detail-item"><span>支付货款方式</span><p>${escapeHtml(detailValue(row.payment))}</p></div>
              <div class="detail-item"><span>资格条件摘要</span><p>${escapeHtml(detailValue(row.qualification))}</p></div>
              <div class="detail-item"><span>交货地点/周期</span><p>${escapeHtml(detailValue(row.delivery))}</p></div>
              <div class="detail-item"><span>第一名单位</span><p>${escapeHtml(detailValue(row.firstUnit))}</p></div>
              <div class="detail-item"><span>报价口径</span><p>${escapeHtml(detailValue(row.priceScope))}</p></div>
              <div class="detail-item"><span>备注</span><p>${escapeHtml(detailValue(row.notes))}</p></div>
              <div class="detail-item"><span>来源链接</span><p><a href="${escapeHtml(row.sourceLink)}" target="_blank" rel="noreferrer noopener">打开原始公告</a></p></div>
            </div>
          </details>
        </article>
      `;
    }

    function renderColumns(rows) {
      const ongoing = rows.filter((row) => row.category === "正在招标");
      const history = rows.filter((row) => row.category === "历史招标");
      els.resultCount.textContent = `当前筛选命中 ${rows.length} 条项目`;
      els.updatedAt.textContent = payload.meta.updatedAt;
      els.ongoingCount.textContent = `${ongoing.length} 条`;
      els.historyCount.textContent = `${history.length} 条`;
      els.ongoingList.innerHTML = ongoing.length ? ongoing.map(renderRow).join("") : '<div class="empty">当前筛选条件下没有正在招标项目。</div>';
      els.historyList.innerHTML = history.length ? history.map(renderRow).join("") : '<div class="empty">当前筛选条件下没有历史招标项目。</div>';
    }

    function syncState() {
      state.keyword = els.keyword.value;
      state.province = els.province.value;
      state.focus = els.focus.value;
      state.category = els.category.value;
      state.sort = els.sort.value;
      const filtered = applyFilters(payload.latest.rows);
      renderSummaries(filtered);
      renderColumns(filtered);
    }

    [els.keyword, els.province, els.focus, els.category, els.sort].forEach((el) => {
      el.addEventListener("input", syncState);
      el.addEventListener("change", syncState);
    });

    renderOverview();
    renderChanges();
    syncState();
  </script>
</body>
</html>
